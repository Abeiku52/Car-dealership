name: Deploy Car Dealership App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: car_dealership_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest-django

    - name: Run linting
      run: |
        flake8 server/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 server/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Set up environment variables
      run: |
        echo "DEBUG=False" >> $GITHUB_ENV
        echo "DATABASE_URL=postgres://postgres:postgres@localhost:5432/car_dealership_test" >> $GITHUB_ENV

    - name: Run Django migrations
      run: |
        cd server
        python manage.py makemigrations
        python manage.py migrate

    - name: Run Django tests
      run: |
        cd server
        python manage.py test

    - name: Build Docker image
      run: |
        docker build -t car-dealership:${{ github.sha }} .
        docker tag car-dealership:${{ github.sha }} car-dealership:latest

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up IBM Cloud CLI
      run: |
        curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
        ibmcloud --version

    - name: Authenticate with IBM Cloud
      run: |
        ibmcloud login --apikey ${{ secrets.IBM_CLOUD_API_KEY }} -r us-south
        ibmcloud target -g default

    - name: Install Code Engine plugin
      run: |
        ibmcloud plugin install code-engine

    - name: Deploy to Code Engine
      run: |
        ibmcloud ce project create --name car-dealership-prod || true
        ibmcloud ce project select --name car-dealership-prod
        ibmcloud ce application create --name car-dealership \
          --image docker.io/library/car-dealership:latest \
          --port 8000 \
          --env DEBUG=False \
          --env ALLOWED_HOSTS=*.codeengine.appdomain.cloud \
          --cpu 0.25 \
          --memory 0.5G \
          --min-scale 0 \
          --max-scale 10

    - name: Get application URL
      run: |
        APP_URL=$(ibmcloud ce application get --name car-dealership --output json | jq -r '.status.url')
        echo "Application deployed at: $APP_URL"
        echo "DEPLOYMENT_URL=$APP_URL" >> $GITHUB_ENV

    - name: Run smoke tests
      run: |
        sleep 30  # Wait for deployment to be ready
        curl -f ${{ env.DEPLOYMENT_URL }}/api/dealers/ || exit 1
        curl -f ${{ env.DEPLOYMENT_URL }}/api/cars/ || exit 1
        echo "Smoke tests passed!"

    - name: Notify deployment success
      run: |
        echo "🚀 Deployment successful!"
        echo "Application URL: ${{ env.DEPLOYMENT_URL }}"