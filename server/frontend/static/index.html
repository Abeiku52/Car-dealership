<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Dealership - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Car Dealership</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about/">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact/">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login/">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="hero-section bg-primary text-white py-5">
        <div class="container text-center">
            <h1 class="display-4">Welcome to Car Dealership</h1>
            <p class="lead">Find your perfect vehicle from our extensive collection</p>
            <a href="#dealers" class="btn btn-light btn-lg">Browse Dealers</a>
        </div>
    </div>

    <div class="container mt-5" id="dealers">
        <h2 class="text-center mb-4">Our Dealers</h2>
        <div class="row" id="dealer-list">
            <!-- Dealers will be loaded here via JavaScript -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load dealers on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadDealers();
        });

        async function loadDealers() {
            try {
                const response = await fetch('/api/dealers/');
                const dealers = await response.json();
                displayDealers(dealers);
            } catch (error) {
                console.error('Error loading dealers:', error);
            }
        }

        function displayDealers(dealers) {
            const dealerList = document.getElementById('dealer-list');
            dealerList.innerHTML = '';

            dealers.forEach(dealer => {
                const dealerCard = `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${dealer.name}</h5>
                                <p class="card-text">
                                    <strong>Location:</strong> ${dealer.city}, ${dealer.state}<br>
                                    <strong>Phone:</strong> ${dealer.phone}<br>
                                    <strong>Email:</strong> ${dealer.email}
                                </p>
                                <a href="/dealer/${dealer.id}/" class="btn btn-primary">View Details</a>
                            </div>
                        </div>
                    </div>
                `;
                dealerList.innerHTML += dealerCard;
            });
        }
    </script>
</body>
</html>
